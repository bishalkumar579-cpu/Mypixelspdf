<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Compress Image</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/tools.css">

</head>

<body>

<header>

   <a href="index.html" class="logo">

    <div class="logo-icon">
        <i class="fa-solid fa-file-image"></i>
    </div>

    <div class="logo-text">
        <span>PixlesPDF</span>
        <small>Smart Image & PDF Toolkit</small>
    </div>

</a>

    <nav id="navbar">

        <a href="index.html">Home</a>
        <a href="index.html#tools">Tools</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>

    </nav>

    <div class="menu-btn" id="menuBtn">
        <i class="fa-solid fa-bars"></i>
    </div>

</header>

<!-- Hero -->

<section class="tool-hero">

    <h1>Compress Image</h1>

    <p>
        Compress JPG, PNG and WebP images without losing quality
    </p>

</section>

<!-- Upload Area -->

<section class="upload-section">

    <div class="upload-box" id="dropArea">

        <i class="fa-solid fa-cloud-arrow-up"></i>

        <h2>Upload images</h2>

        <p>or</p>

        <button id="selectBtn">

            Choose Images

        </button>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden>

    </div>

</section>

<!-- Preview -->

<section class="preview-section">

    <h2>Selected Images</h2>

    <div id="previewContainer">

    </div>

</section>

<!-- Convert -->
<!-- Compression Settings -->

<section class="settings-section">

    <h2>Compression Settings</h2>

    <div class="settings-grid">

        <div class="setting">

            <label>Compression Method</label>

            <select id="compressionMethod">

                <option value="percentage">Reduce by Percentage</option>

                <option value="pixels">Resize by Pixels</option>

            </select>

        </div>

        <div class="setting" id="percentageBox">

            <label>Reduce Image By</label>

            <input
                type="number"
                id="percentage"
                min="1"
                max="99"
                placeholder="Example: 40">

        </div>

        <div id="pixelBox" class="pixel-grid" style="display:none; grid-column:1 / -1;">

            <div class="setting">

                <label>Width (px)</label>

                <input
                    type="number"
                    id="width"
                    placeholder="1920">

            </div>

            <div class="setting">

                <label>Height (px)</label>

                <input
                    type="number"
                    id="height"
                    placeholder="1080">

            </div>

        </div>

    </div>

    <button id="convertBtn">

        Compress Image

    </button>

    <div id="resultBox" style="display:none; margin-top:30px; text-align:center;">

    <h3>Compression Result</h3>

    <p id="originalSize"></p>

    <p id="compressedSize"></p>

    <p id="savedSize"></p>

    <button id="downloadBtn">

        Download Image

    </button>

</div>

</section>
<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/compress-image.js"></script>

</body>

</html>
